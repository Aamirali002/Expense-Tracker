
services:
  backend:
    build: ./server
    container_name: expense-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - mern-network

  frontend:
    build: ./client
    container_name: expense-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge
